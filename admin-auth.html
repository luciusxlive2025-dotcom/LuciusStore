<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Lucius Store Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f5f6fa;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.card-logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#111;text-align:center;margin-bottom:6px}
.card-logo span{color:#1A6BFF}
.card-sub{text-align:center;font-size:.8rem;color:#888;margin-bottom:28px}
.tabs{display:flex;background:#f5f6fa;border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;color:#888;transition:all .2s}
.tab.active{background:#fff;color:#111;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid #e8e8e8;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.88rem;color:#111;outline:none;transition:border-color .2s;background:#fff}
.form-group input:focus{border-color:#1A6BFF}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:40px}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#aaa;cursor:pointer;font-size:.85rem;transition:color .2s}
.pass-eye:hover{color:#1A6BFF}
.btn-submit{width:100%;padding:12px;background:#1A6BFF;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-submit:hover{background:#4F8EFF;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{font-size:.78rem;color:#ef4444;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:9px 12px;margin-bottom:12px;display:none;align-items:center;gap:8px}
.err.show{display:flex}
.ok{font-size:.78rem;color:#10b981;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:9px 12px;margin-bottom:12px;display:none;align-items:center;gap:8px}
.ok.show{display:flex}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#ccc;font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}
</style>
</head>
<body>
<div class="card">
  <div class="card-logo">LUCIUS<span>STORE</span></div>
  <div class="card-sub">Admin Panel · Secure Access</div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
  </div>

  <div id="err" class="err"><i class="fa-solid fa-circle-xmark"></i><span id="err-msg"></span></div>
  <div id="ok" class="ok"><i class="fa-solid fa-circle-check"></i><span id="ok-msg"></span></div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="admin@luciusstore.in"></div>
    <div class="form-group"><label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="l-pass" placeholder="••••••••">
        <i class="fa-regular fa-eye pass-eye" onclick="togglePass('l-pass',this)"></i>
      </div>
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" style="display:none">
    <div class="form-group"><label>Full Name</label><input type="text" id="r-name" placeholder="Your Name"></div>
    <div class="form-group"><label>Email</label><input type="email" id="r-email" placeholder="admin@luciusstore.in"></div>
    <div class="form-group"><label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="r-pass" placeholder="Min 6 characters">
        <i class="fa-regular fa-eye pass-eye" onclick="togglePass('r-pass',this)"></i>
      </div>
    </div>
    <div class="form-group"><label>Confirm Password</label>
      <div class="pass-wrap">
        <input type="password" id="r-pass2" placeholder="Repeat password">
        <i class="fa-regular fa-eye pass-eye" onclick="togglePass('r-pass2',this)"></i>
      </div>
    </div>
    <button class="btn-submit" id="btn-reg" onclick="doRegister()"><i class="fa-solid fa-user-plus"></i> Create Account</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBSfN5ewdWThQ59aziSKRaahfLQfhowOG4",
  authDomain: "lucius-developer-e8de8.firebaseapp.com",
  databaseURL: "https://lucius-developer-e8de8-default-rtdb.firebaseio.com",
  projectId: "lucius-developer-e8de8",
  storageBucket: "lucius-developer-e8de8.firebasestorage.app",
  messagingSenderId: "615591389572",
  appId: "1:615591389572:web:9abdd197910077d605d5d1",
  measurementId: "G-89PZH2KRWW"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Already logged in?
auth.onAuthStateChanged(u=>{ if(u) location.href='admin.html'; });

function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-register').classList.toggle('active', t==='register');
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-register').style.display = t==='register'?'block':'none';
  hideMsg();
}
function showErr(m){const e=document.getElementById('err');document.getElementById('err-msg').textContent=m;e.classList.add('show');document.getElementById('ok').classList.remove('show');}
function showOk(m){const e=document.getElementById('ok');document.getElementById('ok-msg').textContent=m;e.classList.add('show');document.getElementById('err').classList.remove('show');}
function hideMsg(){document.getElementById('err').classList.remove('show');document.getElementById('ok').classList.remove('show');}
function togglePass(id,el){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';el.className=i.type==='text'?'fa-regular fa-eye-slash pass-eye':'fa-regular fa-eye pass-eye';}
function setLoading(btnId,v){const b=document.getElementById(btnId);b.disabled=v;b.innerHTML=v?'<i class="fa-solid fa-spinner fa-spin"></i> Please wait...':b.dataset.orig;}

function doLogin(){
  const e=document.getElementById('l-email').value.trim();
  const p=document.getElementById('l-pass').value;
  if(!e||!p){showErr('Please fill all fields.');return;}
  const btn=document.getElementById('btn-login');
  btn.dataset.orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
  auth.signInWithEmailAndPassword(e,p)
    .then(()=>location.href='admin.html')
    .catch(err=>{
      btn.disabled=false; btn.innerHTML=btn.dataset.orig;
      const msgs={'auth/user-not-found':'No account found with this email.','auth/wrong-password':'Incorrect password.','auth/invalid-email':'Invalid email address.','auth/too-many-requests':'Too many attempts. Try later.'};
      showErr(msgs[err.code]||err.message);
    });
}

function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const e=document.getElementById('r-email').value.trim();
  const p=document.getElementById('r-pass').value;
  const p2=document.getElementById('r-pass2').value;
  if(!name||!e||!p||!p2){showErr('Please fill all fields.');return;}
  if(p!==p2){showErr('Passwords do not match.');return;}
  if(p.length<6){showErr('Password must be at least 6 characters.');return;}
  const btn=document.getElementById('btn-reg');
  btn.dataset.orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';
  auth.createUserWithEmailAndPassword(e,p)
    .then(cred=>cred.user.updateProfile({displayName:name}))
    .then(()=>{showOk('Account created! Redirecting...');setTimeout(()=>location.href='admin.html',1200);})
    .catch(err=>{
      btn.disabled=false; btn.innerHTML=btn.dataset.orig;
      const msgs={'auth/email-already-in-use':'Email already registered.','auth/invalid-email':'Invalid email address.','auth/weak-password':'Password too weak.'};
      showErr(msgs[err.code]||err.message);
    });
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'){const t=document.getElementById('tab-login').classList.contains('active');if(t)doLogin();else doRegister();}});
</script>
</body>
</html>
