<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCIUS STORE ADMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#111;letter-spacing:-1px}
.logo span{color:#1A6BFF}
.sub{font-size:.85rem;color:#888;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.bar-wrap{width:160px;height:2px;background:#eee;border-radius:10px;margin-top:12px;overflow:hidden}
.bar{height:100%;width:0;background:#1A6BFF;border-radius:10px;transition:width .05s linear}
</style>
</head>
<body>
<div class="logo">LUCIUS<span>STORE</span></div>
<div class="sub">Admin Panel</div>
<div class="bar-wrap"><div class="bar" id="bar"></div></div>
<script>
let p=0;
const bar=document.getElementById('bar');
const iv=setInterval(()=>{
  p+=Math.random()*15;
  if(p>=100){p=100;clearInterval(iv);setTimeout(()=>location.href='admin-auth.html',300);}
  bar.style.width=p+'%';
},80);
</script>
</body>
</html>
